<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Finanças Pessoais</title>
        <link rel="stylesheet" href="styles/geral.css">
        <link rel="shortcut icon" href="assets/images/logo.png" type="image/x-icon">
    </head>
    <div id="modal-busca" class="modal-overlay" style="display:none;">
        <div class="modal-busca-box">
            <div class="busca-header">
                <h3>Resultados da busca</h3>
                <button id="btn-fechar-busca" class="btn-fechar">✕</button>
            </div>
            <div id="busca-resultados"></div>
        </div>
    </div>
    <body>
        <header class="perfil-header">
            <img src="assets/images/logo.png" alt="Imagem do site">
            <div class="header-center">
                <span>🔍</span>
                <input type="text" placeholder="Buscar por: Transações, Investimentos e Categorias!">
            </div>
        </header>
        <main class="perfil-main">
            <aside class="perfil-aside">
                <h3>Menu</h3>
                <hr>
                <nav class="perfil-navegacao">
                    <div class="nav-item" data-page="dashboard.html">
                        <span class="nav-icon">📊</span>
                        <span>Dashboard</span>
                    </div>
                    <div class="nav-item" data-page="extrato.html">
                        <span class="nav-icon">📄</span>
                        <span>Extrato</span>
                    </div>
                    <div class="nav-item" data-page="investimentos.html">
                        <span class="nav-icon">📈</span>
                        <span>Investimentos</span>
                    </div>
                    <div class="nav-item" data-page="notificacoes.html">
                        <span class="nav-icon">🔔</span>
                        <span>Notificações</span>
                    </div>
                </nav>
            </aside>
            <section class="perfil-conteudo">
                <div id="conteudo-dinamico"></div>
            </section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script type="module" src="scripts/main.js"></script>
    </body>
</html>
