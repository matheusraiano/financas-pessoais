<section class="dashboard">
    <div class="dashboard-box">
        <div id="seletor-periodo"></div>
    </div>
    <div class="cards-financeiros">
        <div class="card-financeiro saldo">
            <span>Saldo Total</span>
            <h2 id="saldo-total">R$ 0,00</h2>
        </div>
        <div class="card-financeiro receitas">
            <span>Receitas</span>
            <h2 id="receitas-total">R$ 0,00</h2>
        </div>
        <div class="card-financeiro despesas">
            <span>Despesas</span>
            <h2 id="despesas-total">R$ 0,00</h2>
        </div>
        <div class="card-financeiro investimentos">
            <span>Investimentos</span>
            <h2 id="investimentos-total">R$ 0,00</h2>
        </div>
    </div>
    <div class="dashboard-grid">
        <div class="dashboard-box">
            <h3>Fluxo Financeiro</h3>
            <canvas id="graficoFluxo"></canvas>
        </div>
        <div class="dashboard-box">
            <h3>Gastos por Categoria</h3>
            <canvas id="graficoCategorias"></canvas>
        </div>
    </div>
    <div class="dashboard-box">
        <h3>Nova Transação</h3>
        <form id="form-transacao">
            <div class="grupo-form">
                <input type="number" name="valor" id="valor" placeholder="Valor" required>
            </div>
            <div class="grupo-form">
                <select id="tipo">
                    <option value="receita">Receita</option>
                    <option value="despesa">Despesa</option>
                </select>
                <select id="categoria"></select>
            </div>
            <button type="submit">Adicionar Transação</button>
        </form>
    </div>
    <div class="dashboard-box">
        <h3>Nova Categoria</h3>
        <form id="form-categoria">
            <div class="grupo-form">
                <input type="text" id="cat-nome" placeholder="Nome da categoria" required>
                <select id="cat-tipo">
                    <option value="ambos">Receita e Despesa</option>
                    <option value="receita">Só Receita</option>
                    <option value="despesa">Só Despesa</option>
                </select>
            </div>
            <button type="submit">Criar Categoria</button>
        </form>
    </div>
    <div class="dashboard-box">
        <h3>Últimas Transações</h3>
        <div id="ultimas-transacoes"></div>
    </div>
    <div id="modal-transacao" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h3 id="modal-titulo">Transação</h3>
        <form id="form-edicao">
            <div class="grupo-form">
                <input type="number" id="edit-valor" placeholder="Valor" required>
            </div>
            <div class="grupo-form">
                <select id="edit-tipo">
                    <option value="receita">Receita</option>
                    <option value="despesa">Despesa</option>
                </select>
                <select id="edit-categoria"></select>
            </div>
            <div class="modal-botoes">
                <button type="submit" class="btn-salvar">Salvar</button>
                <button type="button" id="btn-deletar" class="btn-deletar">Deletar</button>
                <button type="button" id="btn-fechar" class="btn-fechar">Cancelar</button>
            </div>
        </form>
    </div>
</div>
</div>
</section>
